version: '3.8'

services:
  sophon-stream-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sophon-stream-web:latest
    container_name: sophon-stream-web
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./plugins:/app/plugins
      # Mount sophon-stream SDK if available (for TPU support)
      # - /opt/sophon-stream:/opt/sophon-stream:ro

    environment:
      - JWT_SECRET=your-secret-key-change-in-production
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - LD_LIBRARY_PATH=/opt/sophon-stream/lib:/usr/local/lib

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 512M

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: sophon-stream-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certificates if using HTTPS
      # - ./config/ssl:/etc/nginx/ssl:ro

    depends_on:
      - sophon-stream-web

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
