# ============================================================================
# Sophon-Stream Web Management System - Nginx Reverse Proxy Configuration
# ============================================================================
# Usage:
#   1. Copy this file to /etc/nginx/conf.d/sophon-stream-web.conf
#   2. Modify server_name and upstream as needed
#   3. Test: nginx -t
#   4. Reload: systemctl reload nginx
# ============================================================================

# ── Rate limiting zone ─────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ── Upstream backend ───────────────────────────────────────────────────────
upstream sophon_stream_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment for production)
    # return 301 https://$host$request_uri;

    # If not using HTTPS, serve directly
    include /etc/nginx/conf.d/sophon-stream-location.inc;
}

