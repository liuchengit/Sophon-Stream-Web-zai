# ── Shared location block ─────────────────────────────────────────────────
# This file is referenced by both HTTP and HTTPS server blocks.
# For simplicity, the locations are inlined below. In production with HTTPS,
# extract them to /etc/nginx/conf.d/sophon-stream-location.inc.

# ── Gzip compression ──────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

# ── Security headers ──────────────────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Client body size ──────────────────────────────────────────────────────
client_max_body_size 100m;

# ── Locations ─────────────────────────────────────────────────────────────

# API proxy
location /api/ {
    limit_req zone=api_limit burst=50 nodelay;

    proxy_pass http://sophon_stream_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
}

# Login endpoint with stricter rate limiting
location /api/v1/auth/login {
    limit_req zone=login_limit burst=3 nodelay;

    proxy_pass http://sophon_stream_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# WebSocket proxy
location /ws/ {
    proxy_pass http://sophon_stream_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# Health check (no rate limiting)
location /api/v1/health {
    proxy_pass http://sophon_stream_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Frontend static files
location / {
    proxy_pass http://sophon_stream_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://sophon_stream_backend;
        proxy_http_version 1.1;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# Deny access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}
